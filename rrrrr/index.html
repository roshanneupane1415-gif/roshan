html>
<head>
     <style>
         body{
            font-family:system-ui;
            padding: 20px;
            background: #f4f4f4;
            margin: 0;   
         }
         h1{
            color: #2c3e50;
            margin-bottom: 20px;
         }
            textarea{
                width: 95%;
                height: 60vh;
                padding: 18px;
                font-size: 15px;
                border: 1px solid #ccc;
                border-radius: 6px;
                resize: vertical;
                font-family: inherit;
            }
        button{
            padding: 12px 30px;
            font-size: 18px;
            background: #316357;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top:10px;
        }
        button:hover{
            background-color: #2980b9;
        }
    </style>
    <body>
        <h1>Quick Note Taker</h1>
        <textarea id="noteArea" placeholder="Type your notes here..."></textarea>
        <br><br>
        <button id="saveBtn">💾 Save Note</button>
        <button id ="save-as">📁Save As</button>
       <script src="render.js"></script>
    </body>
